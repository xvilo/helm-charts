apiVersion: v1
kind: Service
metadata:
  name: {{ include "airtrail.fullname" . }}
  labels:
    {{- include "airtrail.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
  selector:
    {{- include "airtrail.selectorLabels" . | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "airtrail.fullname" . }}
  labels:
    {{- include "airtrail.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "airtrail.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "airtrail.selectorLabels" . | nindent 8 }}
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.waitForDb.enabled }}
      initContainers:
        - name: wait-for-db
          image: {{ .Values.waitForDb.image }}
          imagePullPolicy: {{ .Values.waitForDb.pullPolicy }}
          command:
            - sh
            - -c
            - |
              until pg_isready -d "$DB_URL" >/dev/null 2>&1; do
                echo "waiting for database…"; sleep 2;
              done
          env:
            {{- include "airtrail.databaseEnv" . | nindent 12 }}
      {{- end }}
      containers:
        - name: airtrail
          image: {{ include "airtrail.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext: {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: ORIGIN
              value: {{ .Values.origin | quote }}
            {{- include "airtrail.databaseEnv" . | nindent 12 }}
            {{- if .Values.persistence.enabled }}
            - name: UPLOAD_LOCATION
              value: /app/uploads
            {{- end }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          {{- end }}
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-uploads" (include "airtrail.fullname" .)) }}
      {{- end }}
