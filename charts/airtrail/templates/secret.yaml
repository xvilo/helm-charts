{{- if not .Values.database.existingSecret -}}
{{- $url := .Values.database.url -}}
{{- if not $url -}}
  {{- if not (and .Values.database.host .Values.database.password) -}}
    {{- fail "airtrail: set database.existingSecret, database.url, or database.host/port/name/username/password" -}}
  {{- end -}}
  {{- $url = printf "postgres://%s:%s@%s:%v/%s" .Values.database.username .Values.database.password .Values.database.host (.Values.database.port | toString) .Values.database.name -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "airtrail.secretName" . }}
  labels:
    {{- include "airtrail.labels" . | nindent 4 }}
type: Opaque
stringData:
  db-url: {{ $url | quote }}
{{- end -}}
