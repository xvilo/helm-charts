# -- AirTrail application image.
image:
  repository: johly/airtrail
  tag: ""              # defaults to .Chart.appVersion
  pullPolicy: IfNotPresent
imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

replicas: 1

# ORIGIN — the public URL AirTrail is served from. Required for the app to work
# behind a proxy/ingress. Pass a comma-separated list to allow multiple origins.
origin: https://airtrail.example.com

resources:
  requests: { cpu: 100m, memory: 256Mi }
  limits: { memory: 512Mi }

podAnnotations: {}
podSecurityContext: {}
securityContext: {}
nodeSelector: {}
tolerations: []
affinity: {}

service:
  type: ClusterIP
  port: 3000

# Persistent storage for user uploads (airline icons, etc.), mounted at
# UPLOAD_LOCATION (/app/uploads). Disable to run with uploads turned off.
persistence:
  enabled: true
  size: 1Gi
  storageClass: ""
  accessMode: ReadWriteOnce
  existingClaim: ""     # use a pre-created PVC instead of provisioning one

# PostgreSQL connection. No database is bundled — manage it externally.
# AirTrail consumes a single DB_URL, which the chart assembles at runtime from the
# components below (via Kubernetes env interpolation), so each part can be sourced
# independently — e.g. the password from a Secret you manage.
#
# Each value is EITHER:
#   - a plain string -> used directly as the env value, e.g.
#       host: db.example.com
#   - a map          -> rendered verbatim as the env var's source, e.g. to read
#                       from a Secret you manage:
#       password:
#         valueFrom:
#           secretKeyRef:
#             name: airtrail-db
#             key: password
database:
  host: ""                  # required
  port: 5432
  name: airtrail
  username: airtrail
  password: ""              # required — string or secretKeyRef object

# Optional init container that blocks app start until the database is reachable.
waitForDb:
  enabled: true
  image: postgres:16-alpine
  pullPolicy: IfNotPresent

ingress:
  enabled: true
  className: nginx
  host: airtrail.example.com
  annotations: {}
  tls:
    enabled: false
    secretName: ""      # e.g. airtrail-tls (managed by cert-manager)
