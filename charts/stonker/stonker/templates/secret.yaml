{{- $fullname := include "stonker.fullname" . -}}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace $fullname) -}}
{{- $existingData := dict -}}
{{- if $existing -}}{{- $existingData = $existing.data -}}{{- end -}}

{{/* APP_SECRET: value -> existing -> generated. Stays stable across upgrades. */}}
{{- $appSecret := .Values.app.secret -}}
{{- if not $appSecret -}}{{- $appSecret = (get $existingData "APP_SECRET" | default "" | b64dec) -}}{{- end -}}
{{- if not $appSecret -}}{{- $appSecret = randAlphaNum 32 -}}{{- end -}}

{{/* Postgres password (bundled DB): value -> existing -> generated. */}}
{{- $pgPass := .Values.postgresql.auth.password -}}
{{- if not $pgPass -}}{{- $pgPass = (get $existingData "POSTGRES_PASSWORD" | default "" | b64dec) -}}{{- end -}}
{{- if not $pgPass -}}{{- $pgPass = randAlphaNum 24 -}}{{- end -}}

{{- $databaseUrl := .Values.externalDatabase.url -}}
{{- if .Values.postgresql.enabled -}}
{{- $databaseUrl = printf "postgresql://%s:%s@%s-postgres:5432/%s?serverVersion=16&charset=utf8" .Values.postgresql.auth.username $pgPass $fullname .Values.postgresql.auth.database -}}
{{- end -}}
{{- if not $databaseUrl -}}{{- fail "Set postgresql.enabled=true or provide externalDatabase.url" -}}{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "stonker.labels" . | nindent 4 }}
type: Opaque
stringData:
  APP_SECRET: {{ $appSecret | quote }}
  DATABASE_URL: {{ $databaseUrl | quote }}
  POSTGRES_PASSWORD: {{ $pgPass | quote }}
  JWT_PASSPHRASE: {{ .Values.jwt.passphrase | quote }}
