{{- $fullname := include "stonker.fullname" . -}}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace $fullname) -}}
{{- $existingData := dict -}}
{{- if $existing -}}{{- $existingData = $existing.data -}}{{- end -}}

{{/* APP_SECRET: value -> existing -> generated. Stays stable across upgrades
     (it also encrypts stored broker credentials, so it must not change). */}}
{{- $appSecret := .Values.app.secret -}}
{{- if not $appSecret -}}{{- $appSecret = (get $existingData "APP_SECRET" | default "" | b64dec) -}}{{- end -}}
{{- if not $appSecret -}}{{- $appSecret = randAlphaNum 32 -}}{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "stonker.labels" . | nindent 4 }}
type: Opaque
stringData:
  APP_SECRET: {{ $appSecret | quote }}
  JWT_PASSPHRASE: {{ .Values.jwt.passphrase | quote }}
