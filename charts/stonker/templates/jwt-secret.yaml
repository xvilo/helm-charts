{{- if not .Values.jwt.existingSecret -}}
{{- if not (and .Values.jwt.privateKey .Values.jwt.publicKey) -}}
{{- fail "Provide jwt.privateKey and jwt.publicKey (e.g. --set-file jwt.privateKey=config/jwt/private.pem) or set jwt.existingSecret. Generate with: php bin/console lexik:jwt:generate-keypair" -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "stonker.jwtSecretName" . }}
  labels:
    {{- include "stonker.labels" . | nindent 4 }}
type: Opaque
stringData:
  private.pem: |
    {{- .Values.jwt.privateKey | nindent 4 }}
  public.pem: |
    {{- .Values.jwt.publicKey | nindent 4 }}
{{- end -}}
